<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Blank Sheet Template (DEPRECATED)</title>
  <style>
    /* Paste the contents of assets/report.css here */
  </style>
</head>
<!--
  ⚠️  DEPRECATED: This template uses the legacy .sheet model (rigid 210×297mm boxes).

  MIGRATION REQUIRED:
  - Use templates/scientific-dossier.html or templates/professional.html instead
  - These use the new linear flux model with CSS @page rules
  - See STEP3-MIGRATION.md for migration details

  BACKWARD COMPATIBILITY:
  - If you still need the .sheet model, use assets/report.css
  - But note: .sheet model is no longer maintained

  PHASE 6 REFACTORING:
  - Phase 6 migrated from rigid .sheet pagination to browser-native CSS @page
  - Linear flux model is cleaner, more maintainable, and Word-like
  - New templates/report-linear.css replaces old report.css
-->
<body class="paged">

  <!-- ============ FEUILLE X (page Y) — TITLE ============ -->
  <section class="sheet" id="pageX">
    <div class="sheet__body">
      <section id="sX">
        <h2>X. Section Title</h2>
        <p>Your content goes here. Add paragraphs, tables, figures, callouts, etc.</p>

        <aside class="callout">
          <span class="label">À retenir</span>
          Important note or key takeaway.
        </aside>
      </section>
    </div>
    <footer class="sheet__footer">
      <span>Document Title · Subtitle</span>
      <span class="pageno">Page <span class="num">0</span>/TBD</span>
    </footer>
  </section>

</body>
</html>
